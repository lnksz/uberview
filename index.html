<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="/favicon.ico">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" />
        <title>Uberview - Task Overview</title>
        <style>
        :root {
            /* Dark theme (default) */
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #eee;
            --text-muted: #aaa;
            --accent: #0f3460;
            --clickable: #2563eb;
            --header-bg: #0f346085;
            --success: #4ade80;
            --error: #f87171;
            --border: #2a2a4a;
            --hover-bg: rgba(255, 255, 255, 0.02);

            /* Provider color palette (deterministic) */
            --provider-color-0: #3b82f6;
            --provider-color-1: #8b5cf6;
            --provider-color-2: #06b6d4;
            --provider-color-3: #f59e0b;
            --provider-color-4: #10b981;
            --provider-color-5: #ec4899;
            --provider-color-6: #6366f1;
            --provider-color-7: #14b8a6;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f5f5f5;
                --card-bg: #ffffff;
                --text-color: #1a1a2e;
                --text-muted: #666;
                --accent: #e0e7ff;
                --clickable: #2563eb;
                --header-bg: #e0e7ff85;
                --success: #22c55e;
                --error: #ef4444;
                --border: #e0e0e0;
                --hover-bg: rgba(0, 0, 0, 0.02);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 1rem 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-weight: 300;
            font-size: 1.5rem;
        }

        .refresh-btn {
            background: var(--clickable);
            color: var(--text-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.8;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .providers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .provider-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-left: 4px solid var(--provider-color, var(--accent));
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1 1 auto;
            min-width: 280px;
        }

        .provider-refresh-btn {
            background: var(--accent);
            color: var(--text-color);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
            flex-shrink: 0;
            min-width: 5.5rem;
            text-align: center;
        }

        .provider-refresh-btn:hover {
            opacity: 0.8;
        }

        .provider-refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-muted);
            flex-shrink: 0;
        }

        .status-indicator.online {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-indicator.offline {
            background-color: var(--error);
            box-shadow: 0 0 10px var(--error);
        }

        .provider-info {
            flex: 1;
            min-width: 0;
        }

        .provider-name {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .task-count {
            font-weight: 400;
            font-size: 0.8rem;
            color: var(--text-color);
            background: var(--accent);
            padding: 0.1rem 0.4rem;
            border-radius: 8px;
        }

        .provider-url {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .provider-url a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .provider-url a:hover {
            text-decoration: underline;
        }

        .provider-type {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-left: 0.25rem;
            text-transform: uppercase;
        }

        .issues-container {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .issues-header {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .issues-header h2 {
            font-size: 1rem;
            font-weight: 500;
        }

        .issues-count {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .th-label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .sort-btn {
            appearance: none;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .sort-btn:hover {
            color: var(--text-color);
        }

        .sort-btn:focus-visible {
            outline: 2px solid var(--clickable);
            outline-offset: 2px;
            border-radius: 4px;
        }

        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 20;
            font-size: 18px;
            line-height: 1;
            user-select: none;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--hover-bg);
        }

        .issue-title a {
            color: var(--text-color);
            text-decoration: none;
        }

        .issue-title a:hover {
            text-decoration: underline;
        }

        .issue-source {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .issue-ref {
            font-size: 0.85rem;
        }

        .issue-ref a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .issue-ref a:hover {
            text-decoration: underline;
        }

        .date-cell {
            white-space: nowrap;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .issue-status {
            white-space: nowrap;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .issue-priority {
            white-space: nowrap;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 0.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--text-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            padding: 1rem 1.5rem;
            background: rgba(248, 113, 113, 0.1);
            border-left: 3px solid var(--error);
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Uberview</h1>
    </div>

    <div class="providers-grid" id="providers-grid">
        <div class="provider-card">
            <div class="status-indicator"></div>
            <div class="provider-info">
                <div class="provider-name">Loading providers...</div>
            </div>
        </div>
    </div>

    <div class="issues-container">
        <div class="issues-header">
            <h2>Open Issues</h2>
            <span class="issues-count" id="issues-count"></span>
        </div>
        <div id="issues-content">
            <div class="empty-state">
                Click "Refresh" on a provider to load issues
            </div>
        </div>
    </div>

    <script>
        // Provider color palette (deterministic, matches CSS variables)
        const providerColors = [
            '#3b82f6', '#8b5cf6', '#06b6d4', '#f59e0b',
            '#10b981', '#ec4899', '#6366f1', '#14b8a6'
        ];

        // Map provider names to color indices
        let providerColorMap = {};
        let nextColorIndex = 0;

        function getProviderColor(providerName) {
            if (!(providerName in providerColorMap)) {
                providerColorMap[providerName] = nextColorIndex;
                nextColorIndex = (nextColorIndex + 1) % providerColors.length;
            }
            return providerColors[providerColorMap[providerName]];
        }

        // Check server status on page load
        document.addEventListener('DOMContentLoaded', checkStatus);

        async function checkStatus() {
            const grid = document.getElementById('providers-grid');

            try {
                const response = await fetch('/api/status');
                const statuses = await response.json();

                if (!Array.isArray(statuses) || statuses.length === 0) {
                    grid.innerHTML = '<div class="provider-card"><div class="provider-info"><div class="provider-name">No providers configured</div></div></div>';
                    return;
                }

                // Pre-assign colors in order
                statuses.forEach(status => getProviderColor(status.name));

                grid.innerHTML = statuses.map(status => renderProviderCard(status)).join('');
            } catch (error) {
                grid.innerHTML = '<div class="provider-card"><div class="status-indicator offline"></div><div class="provider-info"><div class="provider-name">Failed to load providers</div></div></div>';
            }
        }

        function renderProviderCard(status) {
            const statusClass = status.online ? 'online' : 'offline';
            const countBadge = status.issue_count > 0 ? `<span class="task-count">${status.issue_count}</span>` : '';
            const color = getProviderColor(status.name);

            return `
                <div class="provider-card" data-provider="${escapeHtml(status.name)}" style="border-left-color: ${color};">
                    <div class="status-indicator ${statusClass}"></div>
                    <div class="provider-info">
                        <div class="provider-name">
                            ${escapeHtml(status.name)}
                            ${countBadge}
                        </div>
                        <div class="provider-url">
                            <a href="${escapeHtml(status.url)}" target="_blank">${escapeHtml(status.url)}</a>
                            <span class="provider-type">[${escapeHtml(status.type)}]</span>
                        </div>
                    </div>
                    <button class="provider-refresh-btn" onclick="refreshProvider('${escapeHtml(status.name)}')">
                        Refresh
                    </button>
                </div>
            `;
        }

        // Store issues by provider for aggregation
        let issuesByProvider = {};

        // Sort state (UI). Default is Due ascending.
        // If the user turns sorting "off", we still apply the default ordering (due ASC).
        let sortState = { key: 'due', dir: 'asc' };

        function getSortIcon(dir) {
            if (dir === 'desc') return 'arrow_downward';
            if (dir === 'asc') return 'arrow_upward';
            return 'filter_list_off';
        }

        function nextSortDir(dir) {
            if (dir === 'off') return 'desc';
            if (dir === 'desc') return 'asc';
            return 'off';
        }

        function toggleSort(key) {
            if (sortState.key !== key) {
                sortState = { key, dir: 'desc' };
            } else {
                const dir = nextSortDir(sortState.dir);
                if (dir === 'off') {
                    sortState = { key: null, dir: 'off' };
                } else {
                    sortState = { key, dir };
                }
            }
            renderAllIssues();
        }

        function sortIssuesInPlace(issues) {
            const activeKey = sortState.dir === 'off' ? 'due' : sortState.key;
            const activeDir = sortState.dir === 'off' ? 'asc' : sortState.dir;

            const withIdx = issues.map((issue, idx) => ({ issue, idx }));

            withIdx.sort((a, b) => {
                const ia = a.issue;
                const ib = b.issue;

                let cmp = 0;
                if (activeKey === 'priority') {
                    const pa = (ia.priority || '').trim();
                    const pb = (ib.priority || '').trim();
                    if (!pa && !pb) {
                        cmp = 0;
                    } else if (!pa) {
                        cmp = 1;
                    } else if (!pb) {
                        cmp = -1;
                    } else {
                        cmp = pa.toLowerCase().localeCompare(pb.toLowerCase());
                    }

                    if (cmp !== 0 && activeDir === 'desc') cmp = -cmp;
                } else {
                    const field = activeKey === 'created' ? 'created_at' : (activeKey === 'updated' ? 'updated_at' : 'due_at');
                    const da = ia[field] ? new Date(ia[field]) : null;
                    const db = ib[field] ? new Date(ib[field]) : null;

                    if (!da && !db) {
                        cmp = 0;
                    } else if (!da || Number.isNaN(da.getTime())) {
                        cmp = 1;
                    } else if (!db || Number.isNaN(db.getTime())) {
                        cmp = -1;
                    } else {
                        cmp = da - db;
                        if (cmp !== 0 && activeDir === 'desc') cmp = -cmp;
                    }
                }

                if (cmp !== 0) return cmp;

                // Default tie-breaker: created ASC (then original order).
                const ca = ia.created_at ? new Date(ia.created_at) : null;
                const cb = ib.created_at ? new Date(ib.created_at) : null;
                const ta = ca && !Number.isNaN(ca.getTime()) ? ca.getTime() : 0;
                const tb = cb && !Number.isNaN(cb.getTime()) ? cb.getTime() : 0;
                if (ta !== tb) return ta - tb;
                return a.idx - b.idx;
            });

            issues.splice(0, issues.length, ...withIdx.map(x => x.issue));
        }

        function renderSortableHeader(label, key) {
            const dir = (sortState.key === key) ? sortState.dir : 'off';
            const icon = getSortIcon(dir);
            return `<th><span class="th-label">${escapeHtml(label)}<button class="sort-btn" type="button" aria-label="Sort by ${escapeHtml(label)}" onclick="toggleSort('${key}')"><span class="material-symbols-outlined">${icon}</span></button></span></th>`;
        }

        async function refreshProvider(providerName) {
            const card = document.querySelector(`.provider-card[data-provider="${providerName}"]`);
            const btn = card.querySelector('.provider-refresh-btn');
            const content = document.getElementById('issues-content');
            const count = document.getElementById('issues-count');

            btn.disabled = true;
            btn.textContent = 'Loading...';

            try {
                const response = await fetch('/api/provider/' + encodeURIComponent(providerName) + '/issues');
                const data = await response.json();

                // Update the provider card status
                const statusIndicator = card.querySelector('.status-indicator');
                statusIndicator.className = 'status-indicator ' + (data.status.online ? 'online' : 'offline');

                const providerNameEl = card.querySelector('.provider-name');
                const countBadge = data.status.issue_count > 0 ? `<span class="task-count">${data.status.issue_count}</span>` : '';
                providerNameEl.innerHTML = `${escapeHtml(data.status.name)} ${countBadge}`;

                // Store issues for this provider
                if (data.issues && data.issues.length > 0) {
                    issuesByProvider[providerName] = data.issues;
                } else if (data.error) {
                    // Keep old issues if there was an error, show error message
                    console.error('Error fetching from', providerName, ':', data.error);
                } else {
                    issuesByProvider[providerName] = [];
                }

                // Render all issues from all providers
                renderAllIssues();

            } catch (error) {
                console.error('Failed to fetch issues from', providerName, ':', error);
                const statusIndicator = card.querySelector('.status-indicator');
                statusIndicator.className = 'status-indicator offline';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Refresh';
            }
        }

        function renderAllIssues() {
            const content = document.getElementById('issues-content');
            const countEl = document.getElementById('issues-count');

            // Combine all issues from all providers
            let allIssues = [];
            for (const issues of Object.values(issuesByProvider)) {
                allIssues = allIssues.concat(issues);
            }

            if (allIssues.length === 0) {
                content.innerHTML = '<div class="empty-state">No open issues. Click "Refresh" on a provider to load issues.</div>';
                countEl.textContent = '0 issues';
                return;
            }

            countEl.textContent = allIssues.length + ' issue' + (allIssues.length !== 1 ? 's' : '');
            content.innerHTML = renderIssuesTable(allIssues);
        }

        function renderIssuesTable(issues) {
            sortIssuesInPlace(issues);

            let html = '<table>';
            html += '<thead><tr>';
            html += '<th>Source</th>';
            html += '<th>Ref</th>';
            html += '<th>Title</th>';
            html += '<th>Status</th>';
            html += renderSortableHeader('Priority', 'priority');
            html += renderSortableHeader('Due', 'due');
            html += renderSortableHeader('Created', 'created');
            html += renderSortableHeader('Updated', 'updated');
            html += '</tr></thead>';
            html += '<tbody>';

            for (const issue of issues) {
                const created = formatISODate(issue.created_at);
                const updated = formatISODate(issue.updated_at);
                const dueISO = formatISODate(issue.due_at);
                const due = dueISO ? `${dueISO} (${daysUntilISODate(dueISO)})` : '';
                const urlPath = getUrlPath(issue.web_url);
                const color = getProviderColor(issue.source);
                const status = issue.status || '';
                const priority = issue.priority || '';

                html += `<tr style="border-left: 4px solid ${color};">`;
                html += '<td class="issue-source">' + escapeHtml(issue.source) + '</td>';
                html += '<td class="issue-ref"><a href="' + escapeHtml(issue.web_url) + '" target="_blank">' + escapeHtml(urlPath) + '</a></td>';
                html += '<td class="issue-title"><a href="' + escapeHtml(issue.web_url) + '" target="_blank">' + escapeHtml(issue.title) + '</a></td>';
                html += '<td class="issue-status">' + escapeHtml(status) + '</td>';
                html += '<td class="issue-priority">' + escapeHtml(priority) + '</td>';
                html += '<td class="date-cell">' + escapeHtml(due) + '</td>';
                html += '<td class="date-cell">' + created + '</td>';
                html += '<td class="date-cell">' + updated + '</td>';
                html += '</tr>';
            }

            html += '</tbody></table>';
            return html;
        }

        function getUrlPath(url) {
            try {
                const parsed = new URL(url);
                return parsed.pathname;
            } catch {
                return url;
            }
        }

        function formatISODate(dateStr) {
            if (!dateStr) return '';
            if (typeof dateStr === 'string' && dateStr.length >= 10) {
                // Go time.Time JSON is RFC3339; the leading date is already YYYY-MM-DD.
                return dateStr.slice(0, 10);
            }
            try {
                const d = new Date(dateStr);
                if (Number.isNaN(d.getTime())) return '';
                return d.toISOString().slice(0, 10);
            } catch {
                return '';
            }
        }

        function daysUntilISODate(isoDate) {
            // isoDate: YYYY-MM-DD
            const parts = (isoDate || '').split('-');
            if (parts.length !== 3) return 0;
            const y = Number(parts[0]);
            const m = Number(parts[1]);
            const d = Number(parts[2]);
            if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) return 0;

            const now = new Date();
            const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
            const dueUTC = Date.UTC(y, m - 1, d);
            return Math.round((dueUTC - todayUTC) / 86400000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
